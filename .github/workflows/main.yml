name: CI

on:
  - push
  - pull_request

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 25
      - name: Install dependencies
        run: yarn install --ignore-engines
      - name: Check code quality
        run: yarn biome ci
